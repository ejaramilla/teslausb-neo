name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Run tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build ARM64 binary
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o teslausb-linux-arm64 ./cmd/teslausb

      - name: Package release
        run: |
          tar czf teslausb-neo-${{ github.ref_name }}.tar.gz \
            teslausb-linux-arm64 \
            setup.sh \
            teslausb.example.toml \
            README.md

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD \
            --pretty=format:"- %s" >> changelog.md 2>/dev/null || echo "- Initial release" >> changelog.md
          echo "" >> changelog.md
          cat >> changelog.md <<'MD'

          ## Installation

          Two install methods — pick **one**.

          ### ✅ Recommended (easiest): Raspberry Pi OS Lite + setup script

          Works identically on Windows, macOS, and Linux, and you configure everything over SSH — no need to read a Linux (ext4) filesystem from your computer. Best choice for most people.

          1. Flash **Raspberry Pi OS Lite (64-bit)** with [Raspberry Pi Imager](https://www.raspberrypi.com/software/). In the imager's ⚙ "OS customisation", set your WiFi and enable SSH.
          2. Download `teslausb-neo-${{ github.ref_name }}.tar.gz` below and extract it (or just grab `teslausb-linux-arm64` and `setup.sh`).
          3. Boot the Pi, then copy the files over SSH, e.g. `scp teslausb-linux-arm64 setup.sh <user>@<pi-hostname>:`.
          4. On the Pi: `sudo bash setup.sh`.
          5. Edit the config over SSH (`sudo nano /data/teslausb.toml`), reboot, and plug into the Tesla.

          ### ⚙ Advanced: pre-built Buildroot image (`sdcard.img.xz`)

          A minimal image with the OS and daemon already baked in — boots in ~4s, no Pi OS, no setup script. Trade-off: the config lives on an **ext4** partition, which Windows/macOS can't edit without extra tooling.

          1. Flash **`sdcard.img.xz`** with Raspberry Pi Imager ("Use custom") or balenaEtcher — both decompress `.xz` directly. If Windows offers to "format the disk" afterwards, click **Cancel**.
          2. Put your settings in `/data/teslausb.toml` on the `data` (ext4) partition, using `teslausb.example.toml` as a template:
             - **Linux:** mount the partition and edit it directly.
             - **Windows:** mount the SD card with WSL2 (`wsl --mount`), or use an ext4 driver (Paragon / DiskGenius / Ext2Fsd).
             - **macOS:** use an ext4-capable tool, or edit it on-device via keyboard+HDMI / serial.
          3. Eject, insert into the Pi, and plug into the Tesla.

          **Minimum config either way:** your home WiFi SSID/password and your archive server. See `teslausb.example.toml`.
          MD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            teslausb-neo-${{ github.ref_name }}.tar.gz
            teslausb-linux-arm64
            setup.sh
            teslausb.example.toml
