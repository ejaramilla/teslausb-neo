name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build ARM64 binary
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o teslausb-linux-arm64 ./cmd/teslausb

      - name: Package release
        run: |
          cp teslausb.example.toml teslausb.example.toml
          cp setup.sh setup.sh
          tar czf teslausb-neo-${{ github.ref_name }}.tar.gz \
            teslausb-linux-arm64 \
            setup.sh \
            teslausb.example.toml \
            README.md

      - name: Generate changelog
        id: changelog
        run: |
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD \
            --pretty=format:"- %s" >> changelog.md 2>/dev/null || echo "- Initial release" >> changelog.md
          echo "" >> changelog.md
          echo "## Installation" >> changelog.md
          echo "" >> changelog.md
          echo "1. Download \`teslausb-neo-${{ github.ref_name }}.tar.gz\` below" >> changelog.md
          echo "2. Extract: \`tar xzf teslausb-neo-${{ github.ref_name }}.tar.gz\`" >> changelog.md
          echo "3. Flash Raspberry Pi OS Lite (64-bit) to your SD card" >> changelog.md
          echo "4. Boot the Pi, SSH in, copy \`teslausb-linux-arm64\` and \`setup.sh\` to the Pi" >> changelog.md
          echo "5. Run: \`sudo bash setup.sh\`" >> changelog.md
          echo "6. Edit \`/data/teslausb.toml\`, reboot, plug into Tesla" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            teslausb-neo-${{ github.ref_name }}.tar.gz
            teslausb-linux-arm64
            setup.sh
            teslausb.example.toml
