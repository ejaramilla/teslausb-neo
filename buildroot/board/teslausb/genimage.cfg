image sdcard.img {
  hdimage {
    partition-table-type = "msdos"
  }
  partition boot {
    partition-type = 0xc
    bootable = true
    image = boot.vfat
    size = 50M
  }
  partition rootfs {
    partition-type = 0x83
    image = rootfs.ext4
    size = 200M
  }
  partition data {
    partition-type = 0x83
    image = data.ext4
    size = 300M
  }
  partition cam {
    partition-type = 0x7
    size = 200G
  }
  partition music {
    partition-type = 0x7
    size = 30G
  }
  partition lightshow {
    partition-type = 0x7
    size = 1G
  }
  partition boombox {
    partition-type = 0x7
    size = 100M
  }
}
