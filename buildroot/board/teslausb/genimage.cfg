/* TeslaUSB Neo SD card image layout.
 *
 * Three partitions in the image (boot, rootfs, data).
 * The cam/music/lightshow partitions are NOT included — they would
 * make the image 200+ GB. Instead, the setup.sh script or the
 * teslausb daemon creates and formats them on first boot using
 * the remaining SD card space.
 */

image boot.vfat {
  vfat {
    /* Entries listed in `files` are flattened to the root of the FAT
     * (genimage strips the source directory), which is exactly where the
     * Pi boot ROM/firmware expects them. */
    files = {
      "bcm2710-rpi-zero-2-w.dtb",
      "rpi-firmware/bootcode.bin",
      "rpi-firmware/start.elf",
      "rpi-firmware/fixup.dat",
      "rpi-firmware/config.txt",
      "zImage",
      "cmdline.txt"
    }

    /* The firmware looks for dtoverlay=dwc2 at overlays/dwc2.dtbo, so these
     * must keep their subdirectory. A `file` block preserves the target path
     * (unlike `files`, which flattens). overlay_map.dtb is consulted by the
     * firmware to resolve overlay names. */
    file overlays/dwc2.dtbo {
      image = "rpi-firmware/overlays/dwc2.dtbo"
    }
    file overlays/overlay_map.dtb {
      image = "rpi-firmware/overlays/overlay_map.dtb"
    }
  }
  size = 64M
}

image data.ext4 {
  ext4 {
    label = "data"
  }
  size = 300M
}

image sdcard.img {
  hdimage {
    partition-table-type = "mbr"
  }

  partition boot {
    partition-type = 0xc
    bootable = true
    image = boot.vfat
  }

  partition rootfs {
    partition-type = 0x83
    image = rootfs.ext4
  }

  partition data {
    partition-type = 0x83
    image = data.ext4
  }
}
