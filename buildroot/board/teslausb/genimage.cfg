/* TeslaUSB Neo SD card partition layout.
 *
 * Boot (FAT32) + rootfs (ext4, read-only) + data (ext4, writable) +
 * cam/music/lightshow (raw, formatted as exFAT on first boot by the daemon).
 *
 * Note: We use an extended partition (p3) to hold logical partitions p5-p7,
 * since MBR only allows 4 primary partitions.
 */

image boot.vfat {
  vfat {
    files = {
      "bcm2710-rpi-zero-2-w.dtb",
      "rpi-firmware/bootcode.bin",
      "rpi-firmware/start.elf",
      "rpi-firmware/fixup.dat",
      "rpi-firmware/config.txt",
      "zImage",
      "cmdline.txt"
    }
  }
  size = 64M
}

image sdcard.img {
  hdimage {
    partition-table-type = "msdos"
  }

  /* p1: Boot partition */
  partition boot {
    partition-type = 0xc
    bootable = true
    image = boot.vfat
  }

  /* p2: Root filesystem (read-only) */
  partition rootfs {
    partition-type = 0x83
    image = rootfs.ext4
  }

  /* p3: Data partition (writable, SQLite + config + logs) */
  partition data {
    partition-type = 0x83
    image = data.ext4
    size = 300M
  }

  /* p4: Extended partition containing cam, music, lightshow */
  partition extended {
    partition-type = 0x5
    size = 0
  }

  /* p5: Cam partition (exFAT, formatted on first boot) */
  partition cam {
    partition-type = 0x7
    size = 200G
  }

  /* p6: Music partition (exFAT, formatted on first boot) */
  partition music {
    partition-type = 0x7
    size = 30G
  }

  /* p7: LightShow partition (exFAT, formatted on first boot) */
  partition lightshow {
    partition-type = 0x7
    size = 1100M
  }
}

image data.ext4 {
  ext4 {
    label = "data"
  }
  size = 300M
}
