/* TeslaUSB Neo SD card image layout.
 *
 * Three partitions in the image (boot, rootfs, data).
 * The cam/music/lightshow partitions are NOT included — they would
 * make the image 200+ GB. Instead, the setup.sh script or the
 * teslausb daemon creates and formats them on first boot using
 * the remaining SD card space.
 */

image boot.vfat {
  vfat {
    files = {
      "bcm2710-rpi-zero-2-w.dtb",
      "rpi-firmware/bootcode.bin",
      "rpi-firmware/start.elf",
      "rpi-firmware/fixup.dat",
      "rpi-firmware/config.txt",
      "zImage",
      "cmdline.txt"
    }
  }
  size = 64M
}

image data.ext4 {
  ext4 {
    label = "data"
  }
  size = 300M
}

image sdcard.img {
  hdimage {
    partition-table-type = "mbr"
  }

  partition boot {
    partition-type = 0xc
    bootable = true
    image = boot.vfat
  }

  partition rootfs {
    partition-type = 0x83
    image = rootfs.ext4
  }

  partition data {
    partition-type = 0x83
    image = data.ext4
  }
}
